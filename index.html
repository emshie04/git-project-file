<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRAUX - Welcome</title>
    <link rel="icon" type="image/png" href="libraux.png">
    
    <style>
        /* Basic Page Setup */
        html, body {
            margin: 0px;
            padding: 0px;
            background: linear-gradient(to bottom, #3d0000, #1a0000);
            color: #ffffff;
            font-family: sans-serif;
            height: 100%; /* More traditional than 100vh */
            overflow: hidden;
        }

        /* Center Container */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%; 
            text-align: center;
        }

        /* Heading Style */
        .hero-title {
            font-size: 80px;
            font-weight: 900;
            margin-top: 0px;
            margin-bottom: 10px;
            letter-spacing: -2px;
            display: inline-block;
            
            /* Gradient Text Logic */
            background-image: linear-gradient(to right, #ffffff, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Subtitle Style */
        .hero-subtitle {
            font-size: 20px;
            margin-bottom: 40px;
            /* Using a simple hex code for the gray look instead of opacity */
            color: #cccccc; 
        }

        /* Button Style - Written property by property */
        .enter-btn {
            background-color: #f59e0b;
            color: #000000;
            padding-top: 18px;
            padding-bottom: 18px;
            padding-left: 45px;
            padding-right: 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            display: inline-block;
            
            /* Box Shadow for depth */
            box-shadow: 0px 10px 20px rgba(245, 158, 11, 0.3);
            
            /* Animation speed */
            transition-duration: 0.4s;
            transition-property: all;
        }

        /* Hover State */
        .enter-btn:hover {
            transform: scale(1.1);
            background-color: #ffffff;
            box-shadow: 0px 15px 30px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="hero-section">
        
        <h1 class="hero-title">LIBRAUX</h1>
        
        <p class="hero-subtitle">
            Your gateway to a world of knowledge and imagination.
        </p>
        
        <a href="Page2-Login.html" class="enter-btn">
            ENTER LIBRARY
        </a>

    </div>
    </body>
</html>
