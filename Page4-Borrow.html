<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRAUX - Borrowing System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="libraux.png">
    <style>
        /* 1. Global Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #3d0000, #1a0000);
            margin: 0;
            color: white;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        header a:hover { color: orange; }

        /* 2. Form Container */
        .borrow-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .borrow-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid gold;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.5);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            bottom: 15px;
            color: #1e3a8a;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box; /* Prevents input from overflowing */
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .date-row input { padding-left: 10px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: gold;
        }

        .confirmation-box {
            background: rgba(16, 185, 129, 0.2);
            border: 1px dashed #10b981;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none; 
        }

        .btn-main {
            width: 100%;
            background-color: orange;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover {
            background-color: #e69500;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight: 900; font-size: 24px; letter-spacing: 2px; color:orange;">LIBRAUX</div>
    <nav style="display: flex; gap: 20px;">
        <a href="Page3-Home.html">HOME</a>
        <a href="Page5-Catalog.html">CATALOG</a>
        <a href="Page4-Borrow.html" style="color: gold;">BORROW</a>
        <a href="Page6-Duedate.html">MY LOANS</a>
        <a href="Page8-Aboutus.html">ABOUT US</a>
        <a href="Page7-Settings.html">SETTINGS</a>

    </nav>
</header>

<div class="borrow-container">
    <div class="borrow-card">
        <h2 style="margin-top: 0;">Borrow a Book</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Select a title and set your return date.</p>

        <form id="mainBorrowForm">
            <div class="search-wrapper">
                <label>Book Title</label>
                <i class="fas fa-search"></i>
                <input type="text" id="bookSearchInput" list="allBooks" placeholder="Start typing..." required oninput="showPreview()">
                
                <datalist id="allBooks">
                    <option value="The Hobbit"> <option value="1984"> <option value="The Alchemist">
                    <option value="Harry Potter"> <option value="Atomic Habits"> <option value="Deep Work">
                    <option value="Sapiens"> <option value="Cosmos"> <option value="Zero to One">
                    <!-- Add more options as needed -->
                </datalist>
            </div>

            <div class="confirmation-box" id="previewBox">
                <small>Selected Book:</small>
                <strong id="bookPreviewDisplay" style="display:block; color:#10b981; font-size: 18px;"></strong>
            </div>

            <div class="date-row">
                <div>
                    <label>Borrow Date</label>
                    <input type="date" id="bDate" required>
                </div>
                <div>
                    <label>Return Date</label>
                    <input type="date" id="rDate" required>
                </div>
            </div>

            <button type="submit" class="btn-main">
                <i class="fas fa-check"></i> CONFIRM BORROW
            </button>
        </form>
    </div>
</div>
<script>
    window.onload = function() {
        // 1. Set default Borrow Date to Today
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        document.getElementById('bDate').value = todayStr;
        
        // 2. Set default Return Date to 7 days from now (Standard Policy)
        const nextWeek = new Date();
        nextWeek.setDate(today.getDate() + 7);
        document.getElementById('rDate').value = nextWeek.toISOString().split('T')[0];
        
        // 3. Handle Catalog Redirection
        const selected = localStorage.getItem('selectedBook');
        if(selected) {
            document.getElementById('bookSearchInput').value = selected;
            showPreview();
            localStorage.removeItem('selectedBook'); 
        }
    };

    function showPreview() {
        const val = document.getElementById('bookSearchInput').value;
        const box = document.getElementById('previewBox');
        const display = document.getElementById('bookPreviewDisplay');
        
        if(val.trim().length > 0) {
            box.style.display = "block";
            display.innerText = val;
        } else {
            box.style.display = "none";
        }
    }

    document.getElementById('mainBorrowForm').onsubmit = function(e) {
        e.preventDefault();
        
        const bookTitle = document.getElementById('bookSearchInput').value;
        const startDate = document.getElementById('bDate').value;
        const endDate = document.getElementById('rDate').value;

        // Date Validation
        if (endDate < startDate) {
            alert("Error: Return date cannot be before borrow date!");
            return;
        }

        // The Object structure that all other pages rely on
        const newLoan = {
            title: bookTitle,
            borrowDate: startDate,
            returnDate: endDate,
            penaltyRate: 15 // Saving the rate inside the object ensures consistency
        };

        let borrowedList = JSON.parse(localStorage.getItem('borrowedList') || "[]");
        
        // Check for duplicates
        const isAlreadyBorrowed = borrowedList.some(item => item.title === bookTitle);
        
        if (isAlreadyBorrowed) {
            alert("You are already borrowing this book!");
        } else {
            borrowedList.push(newLoan);
            localStorage.setItem('borrowedList', JSON.stringify(borrowedList));
            
            alert(`Successfully Borrowed: ${bookTitle}`);
            // Redirect to My Loans to confirm the data is there
            window.location.href = "Page6-Duedate.html"; 
        }
    };
</script>
</body>
</html>
