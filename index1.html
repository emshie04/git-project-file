<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Library System - Login</title>
    <link rel="icon" type="image/png" href="libraux.png">
    <style>
        /* 1. Global Page Settings */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #3d0000, #1a0000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Main Login Box Container */
        .login-box {
            width: 350px;
            text-align: center;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid gold;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.5);
        }

        h2 {
            color: #ca7b04;
            font-size: 36px;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 3. Input Containers */
        .input-container {
            background-color: #ffffff;
            border-radius: 50px;
            margin-bottom: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .input-container:focus-within {
            box-shadow: 0 0 10px gold;
        }

        .input-container i {
            color: #1e3a8a;
            margin-right: 15px;
            font-size: 18px;
            width: 20px; /* Keeps icons aligned */
        }

        #togglePassword {
            cursor: pointer;
            color: #64748b;
            font-size: 16px;
            margin-right: 0;
            margin-left: 10px;
        }

        input {
            border: none;
            background-color: transparent;
            outline: none;
            font-size: 16px;
            width: 100%;
            color: #1e3a8a;
        }

        /* 4. Login Button Styling */
        .login-btn {
            width: 100%;
            background-color: #ca7b04;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: orange;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>User Login</h2>
        
        <div class="input-container">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-container">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-eye" id="togglePassword"></i>
        </div>
        
        <button class="login-btn" onclick="handleLogin()">Login</button>
    </div>

    <script>
        // --- 1. Toggle Password Visibility ---
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye slash icon
            this.classList.toggle('fa-eye-slash');
        });

        // --- 2. Login Handling ---
        function handleLogin() {
            var userValue = document.getElementById('username').value.trim();
            var passValue = document.getElementById('password').value;

            var authorizedMembers = [
                { user: "Lalyn", pass: "Lota" },
                { user: "Joy", pass: "Moaje" },
                { user: "Gerby", pass: "Forcadas" },
                { user: "Kyle", pass: "Casero" }
            ];

            // find if the user exists
            var foundUser = authorizedMembers.find(member => member.user.toLowerCase() === userValue.toLowerCase());

            // Logic for alerts
            if (!foundUser) {
                alert("Error: Username does not exist.");
            } else {
                if (foundUser.pass === passValue) {
                    alert("Login Successful! Welcome " + foundUser.user);
                    localStorage.setItem('currentUser', foundUser.user);
                    // Redirecting to your home page
                    window.location.href = "Page3-Home.html";
                } else {
                    alert("Error: Incorrect Password.");
                }
            }
        }

        // Allow pressing "Enter" to login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>  
</body>
</html>
