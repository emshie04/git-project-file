<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LIBRAUX - Master Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- GLOBAL SETUP --- */
        body {
            background: linear-gradient(to bottom, #3d0000, #1a0000);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        header a:hover { color: orange; }

        /* --- SEARCH & FILTER SECTION --- */
        .catalog-container { padding: 40px 50px; }
        
        .search-section { 
            text-align: center;
            margin-bottom: 40px; 
        }

        h1 {
            color: gold;
            border: 10px;
        }

        .search-box { 
            position: relative; 
            max-width: 600px; 
            margin: 0 auto 20px; 
        }

        .search-box i { 
            position: absolute; 
            left: 20px; top: 50%; 
            transform: translateY(-50%); 
            color: #1e3a8a; 
        }

        #catalogSearch {
            width: 100%; 
            padding: 18px 55px; 
            border-radius: 50px; 
            border: none;
            font-size: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            outline: none;
            box-sizing: border-box;
        }

        /* --- CATEGORY TABS --- */
        .category-tabs { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        .tab { 
            padding: 10px 20px; 
            border-radius: 20px; 
            background: rgba(255,255,255,0.1); 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.2); 
            transition: 0.3s;
            color: white;
        }

        .tab.active { 
            background: gold; 
            color: black; 
            font-weight: bold; 
            border-color: gold; 
        }

        /* --- BOOK GRID --- */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
        }

        .book-card {  
            display: flex; 
            flex-direction: column; 
            transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .book-card:hover { 
            transform: translateY(-10px); 
            border-color: gold; 
        }

        .book-img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-bottom: 3px solid gold; 
        }

        .book-info { 
            padding: 15px; 
            text-align: center; 
            flex-grow: 1; 
        }

        .book-info h4 { 
            font-size: 16px; 
            margin: 5px 0; 
            height: 40px; 
            overflow: hidden; 
        }

        .book-info span { 
            font-size: 11px; 
            color: gold; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .btn-borrow { 
            margin: 0 15px 15px; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            background: gold; 
            color: black;
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .btn-borrow:hover { background: yellow; }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight: 900; font-size: 24px; letter-spacing: 2px; color:orange;">LIBRAUX</div>
    <nav style="display: flex; gap: 20px;">
        <a href="Page3-Home.html">HOME</a>
        <a href="Page5-Catalog.html" style="color: gold;">CATALOG</a>
        <a href="Page4-Borrow.html">BORROW</a>
        <a href="Page6-Duedate.html">MY LOANS</a>
        <a href="Page8-Aboutus.html">ABOUT US</a>
        <a href="Page7-Settings.html">SETTINGS</a>
    </nav>
</header>

<div class="catalog-container">
    <div class="search-section">
        <h1>AVAILABLE BOOKS</h1>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="catalogSearch" placeholder="Search by title or category..." onkeyup="filterBooks()">
        </div>
        <div class="category-tabs" id="tabs">
            <div class="tab active" onclick="filterTab('All', this)">All</div>
            <div class="tab" onclick="filterTab('Fiction', this)">Fiction</div>
            <div class="tab" onclick="filterTab('Science', this)">Science</div>
            <div class="tab" onclick="filterTab('History', this)">History</div>
            <div class="tab" onclick="filterTab('Self-Help', this)">Self-Help</div>
        </div>
    </div>

    <div class="book-grid" id="bookGrid"></div>
</div>

        { t: "The 5 AM Club", c: "Self-Help", i: "https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=400" },
        { t: "Zero to One", c: "Self-Help", i: "https://images.unsplash.com/photo-1512428559083-5d0df9a30143?w=400" },
        { t: "Limitless", c: "Self-Help", i: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=400" }
    ];

    const grid = document.getElementById('bookGrid');

    function display(data) {
        grid.innerHTML = "";
        data.forEach(book => {
            const card = document.createElement('div');
            card.className = "book-card";
            card.innerHTML = `
                <img src="${book.i}" class="book-img">
                <div class="book-info">
                    <span>${book.c}</span>
                    <h4>${book.t}</h4>
                </div>
                <button class="btn-borrow" onclick="startBorrow('${book.t}')">BORROW</button>
            `;
            grid.appendChild(card);
        });
    }

    // SEARCH FILTER
    function filterBooks() {
        const query = document.getElementById('catalogSearch').value.toLowerCase();
        const filtered = books.filter(b => b.t.toLowerCase().includes(query) || b.c.toLowerCase().includes(query));
        display(filtered);
    }

    // TAB FILTER
    function filterTab(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        if(cat === 'All') display(books);
        else display(books.filter(b => b.c === cat));
    }

    // BRIDGE TO PAGE 4
    function startBorrow(title) {
        localStorage.setItem('selectedBook', title);
        window.location.href = "Page4-Borrow.html";
    }

    window.onload = () => display(books);
</script>

</body>
</html>
