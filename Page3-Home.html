<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>LIBRAUX - Dashboard</title>
    <link rel="icon" type="image/png" href="libraux.png">
    <style>
        /* 1. Global Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #3d0000, #1a0000);
            margin: 0; 
            color: #ffffff; 
            min-height: 100vh;
        }
        
        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-weight: 900;
            font-size: 30px;
            letter-spacing: 2px;
            color: #f59e0b;
        }

        nav {
            display: flex;   
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #f59e0b; }

        /* 2. Layout Wrapper */
        .dashboard-wrapper {
            padding: 40px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-header { margin-bottom: 40px; }
        .welcome-header h1 { font-size: 36px; margin: 0; }
        .text-accent { color: #f59e0b; }

        /* 3. Stats Grid */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-box {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid gold;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); }

        .stat-box i {
            font-size: 40px;
            color: #f59e0b;
            margin-bottom: 15px;
        }

        .stat-box h3 { 
            font-size: 32px; 
            margin: 10px 0; 
        }

        /* 4. Navigation Buttons */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }

        .btn-main {
            background-color: #f59e0b;
            color: #ffffff;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-main:hover { 
            background-color: #d97706; 
            transform: scale(1.05);
        }
        
        .btn-return { background-color: #10b981; }
        .btn-return:hover { background-color: #059669; }

        .logout-btn {
            background: none;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">LIBRAUX</div>
    <nav>
        <a href="Page3-Home.html" style="color: gold;">HOME</a>
        <a href="Page5-Catalog.html">CATALOG</a>
        <a href="Page4-Borrow.html">BORROW</a>
        <a href="Page6-Duedate.html">MY LOANS</a>
       <a href="Page8-Aboutus.html">ABOUT US</a>
       <a href="Page7-Settings.html">SETTINGS</a>

    
</header>
        
    <div class="dashboard-wrapper">
        <div class="welcome-header">
            <h1>Welcome back, <span id="displayUser" class="text-accent">Student</span>!</h1>
            <p id="currentDate"></p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <i class="fas fa-book-open"></i>
                <h3 id="loanCount">0</h3>
                <p>ACTIVE LOANS</p>
            </div>

            <div class="stat-box">
                <i class="fas fa-calendar-alt"></i>
                <h3 id="daysLeft">--</h3>
                <p>NEAREST DUE DATE</p>
            </div>

            <div class="stat-box">
                <i class="fas fa-hand-holding-usd"></i>
                <h3 id="totalPenalty">₱0</h3>
                <p>TOTAL PENALTY</p>
            </div>

            <div class="stat-box">
                <i class="fas fa-award"></i>
                <h3 id="memberRank">BRONZE</h3>
                <p>MEMBER RANK</p>
            </div>
        </div>

        <h3>Quick Actions</h3>
        <div class="btn-group">
            <button class="btn-main" onclick="location.href='Page5-Catalog.html'">
                <i class="fas fa-search"></i> Browse Catalog
            </button>
            <button class="btn-main" onclick="location.href='Page4-Borrow.html'">
                <i class="fas fa-plus"></i> Borrow New Book
            </button>
            <button class="btn-main btn-return" onclick="location.href='Page6-Duedate.html'">
                <i class="fas fa-undo"></i> Return Book
            </button>
        </div>
    </div>

    <script>
    window.onload = function() {
        // 1. Auth Check
        var user = localStorage.getItem('currentUser');
        if (!user) { 
            window.location.href = "index.html"; 
            return;
        }
        document.getElementById('displayUser').innerText = user;

        // 2. Set Today's Date (Midnight)
        var today = new Date();
        today.setHours(0,0,0,0); 
        document.getElementById('currentDate').innerText = today.toDateString();

        // 3. Data Retrieval
        var savedData = localStorage.getItem('borrowedList');
        var borrowedList = savedData ? JSON.parse(savedData) : [];
        document.getElementById('loanCount').innerText = borrowedList.length;

        // 4. Synchronized Logic Calculations
        var shortestDays = Infinity; 
        var totalPenalty = 0;
        var penaltyRatePerDay = 15; // UPDATED to 15 to match Loan Page

        borrowedList.forEach(book => {
            if (!book.returnDate) return; // Skip if no date exists

            var dueDate = new Date(book.returnDate);
            dueDate.setHours(0,0,0,0);
            
            // Calculate difference in time and days
            var diffTime = dueDate - today;
            var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // Track the most urgent book
            if (diffDays < shortestDays) { 
                shortestDays = diffDays; 
            }

            // Accumulate penalty ONLY if Today is AFTER Due Date
            if (today > dueDate) {
                // This formula now matches Page 6 exactly
                var daysOverdue = Math.ceil((today - dueDate) / (1000 * 60 * 60 * 24));
                totalPenalty += (daysOverdue * penaltyRatePerDay);
            }
        });

        // 5. Update Due Date Display
        var dueDisplay = document.getElementById('daysLeft');
        if (borrowedList.length > 0) {
            if (shortestDays < 0) {
                dueDisplay.innerText = "OVERDUE";
                dueDisplay.style.color = "#ef4444";
            } else if (shortestDays === 0) {
                dueDisplay.innerText = "DUE TODAY";
                dueDisplay.style.color = "#f59e0b";
            } else {
                dueDisplay.innerText = shortestDays + " Days";
                dueDisplay.style.color = "#ffffff";
            }
        } else {
            dueDisplay.innerText = "None";
        }

        // 6. Update Penalty Display (Matches Page 6 now)
        var penaltyDisplay = document.getElementById('totalPenalty');
        penaltyDisplay.innerText = "₱" + totalPenalty.toFixed(2);
        penaltyDisplay.style.color = totalPenalty > 0 ? "#ef4444" : "#10b981";

        // 7. Rank Logic
        var count = borrowedList.length;
        var rank = "BRONZE";
        var rankColor = "#cd7f32"; 
        if (count >= 10) { rank = "GOLD"; rankColor = "#f59e0b"; }
        else if (count >= 5) { rank = "SILVER"; rankColor = "#94a3b8"; }
        
        var rankDisplay = document.getElementById('memberRank');
        rankDisplay.innerText = rank;
        rankDisplay.style.color = rankColor;
    };

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = "Page2-Login.html";
    }
</script>
</body>
</html>
